name: Feature request
description: Suggest an enhancement for Formattr.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem and proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point are you trying to address?
      placeholder: It is currently hard to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach.
      placeholder: Add a setting that...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples, links, or screenshots.
