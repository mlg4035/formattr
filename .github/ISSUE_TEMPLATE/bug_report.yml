name: Bug report
description: Report a reproducible issue in Formattr.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please include enough detail to reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: A clear and concise summary...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps, including sample input where relevant.
      placeholder: |
        1. Go to ...
        2. Select ...
        3. Click ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error/log output
      description: Paste stack traces or terminal output.
      render: shell
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.11.8
