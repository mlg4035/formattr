server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Avoid IPv6 upstream attempts in environments without IPv6 routing.
  resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;

  # Security headers for static app responses.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header X-XSS-Protection "0" always;

  location / {
    try_files $uri /index.html;
  }

  # Cache hashed static assets aggressively.
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # Same-origin proxy to avoid browser CORS issues for ToolerBox transcript API.
  location /api/toolerbox/youtube-transcript {
    proxy_pass https://toolerbox.com/api/v1/youtube-transcript;

    # Required for Cloudflare-backed TLS upstream.
    proxy_ssl_server_name on;
    proxy_ssl_name toolerbox.com;

    proxy_set_header Host toolerbox.com;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Map frontend header to upstream bearer auth token.
    proxy_set_header Authorization "Bearer $http_x_toolerbox_api_key";
    proxy_set_header X-Toolerbox-Api-Key "";
  }
}
