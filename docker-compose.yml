services:
  formattr:
    container_name: formattr
    build:
      context: .
      dockerfile: Dockerfile
    image: formattr:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - formattr_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.formattr.rule=Host(`${FORMATTR_HOST}`)"
      - "traefik.http.routers.formattr.entrypoints=websecure"
      - "traefik.http.routers.formattr.tls=true"
      - "traefik.http.routers.formattr.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.formattr.loadbalancer.server.port=8501"
    networks:
      - traefik

volumes:
  formattr_data:

networks:
  traefik:
    external: true
