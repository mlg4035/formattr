services:
  formattr:
    build: .
    container_name: formattr
    image: formattr:latest
    restart: unless-stopped
    networks:
      - llm-internal
      - traefik-proxy
    expose:
      - "8501"
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.formattr.rule=Host(`formattr.example.com`)"
      - "traefik.http.routers.formattr.entrypoints=websecure"
      - "traefik.http.routers.formattr.tls=true"
      - "traefik.http.routers.formattr.tls.certresolver=letsencrypt"
      - "traefik.http.services.formattr.loadbalancer.server.port=8501"

networks:
  traefik-proxy:
    external: true
  llm-internal:
    external: true
