services:
  formattr-web:
    container_name: formattr-web
    build:
      context: .
      dockerfile: web.Dockerfile
    image: formattr-web:latest
    restart: unless-stopped
    networks:
      - llm-internal
      - traefik-proxy
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.formattr-web.rule=Host(`${FORMATTR_HOST}`)"
      - "traefik.http.routers.formattr-web.entrypoints=websecure"
      - "traefik.http.routers.formattr-web.tls=true"
      - "traefik.http.routers.formattr-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.formattr-web.loadbalancer.server.port=80"
      - "traefik.http.routers.formattr-web.middlewares=formattr-web-ratelimit"
      - "traefik.http.middlewares.formattr-web-ratelimit.ratelimit.average=60"
      - "traefik.http.middlewares.formattr-web-ratelimit.ratelimit.burst=120"

networks:
  traefik-proxy:
    external: true
  llm-internal:
    external: true
